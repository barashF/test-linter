name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    unit-tests:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version: "1.26.1"

            - name: Run unit tests
              run: go test ./...

            - name: Building
              run: go build -o logint ./cmd/loglint
