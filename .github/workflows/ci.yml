name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    unit-tests:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version: "1.26.1"

            - name: Run unit tests
              run: go test ./...

            - name: Building
              run: go build -o logint ./cmd/loglint

    release:
        name: Release with GoReleaser
        runs-on: ubuntu-latest
        needs: unit-tests
        if: startsWith(github.ref, 'refs/tags/v')

        permissions:
            contents: write
            #test
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.26.1"

            - name: Run GoReleaser
              uses: goreleaser/goreleaser-action@v6
              with:
                  distribution: goreleaser
                  version: "~> v2"
                  args: release --clean
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
